name: Build server.exe (Windows x64)

on:
  workflow_dispatch:   # manual trigger only — button in GitHub Actions UI

jobs:
  build:
    runs-on: windows-latest   # always x64 Intel/AMD

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flask flask-cors pandas openpyxl xlrd requests numpy pyinstaller

      - name: Build server.exe with PyInstaller
        run: |
          python -m PyInstaller --onedir --noconfirm server.py

      - name: Upload dist/server as artifact
        uses: actions/upload-artifact@v4
        with:
          name: server-windows-x64
          path: backend/dist/server/
          retention-days: 30