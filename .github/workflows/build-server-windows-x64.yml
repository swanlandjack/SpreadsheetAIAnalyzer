name: Build server.exe (Windows x64)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flask flask-cors pandas openpyxl xlrd requests numpy pyinstaller

      - name: Build server.exe with PyInstaller
        run: |
          python -m PyInstaller --onedir --noconfirm `
            --hidden-import=flask `
            --hidden-import=flask_cors `
            --hidden-import=werkzeug `
            --hidden-import=werkzeug.routing `
            --hidden-import=werkzeug.exceptions `
            --hidden-import=werkzeug.serving `
            --hidden-import=werkzeug.middleware `
            --hidden-import=werkzeug.middleware.proxy_fix `
            --hidden-import=werkzeug.debug `
            --hidden-import=jinja2 `
            --hidden-import=jinja2.ext `
            --hidden-import=click `
            --hidden-import=pandas `
            --hidden-import=pandas._libs.tslibs.timedeltas `
            --hidden-import=pandas._libs.tslibs.np_datetime `
            --hidden-import=pandas._libs.tslibs.nattype `
            --hidden-import=pandas._libs.tslibs.offsets `
            --hidden-import=pandas._libs.tslibs.timestamps `
            --hidden-import=pandas._libs.interval `
            --hidden-import=pandas._libs.hashtable `
            --hidden-import=pandas._libs.lib `
            --hidden-import=pandas._libs.missing `
            --hidden-import=pandas._libs.reduction `
            --hidden-import=pandas._libs.reshape `
            --hidden-import=pandas._libs.sparse `
            --hidden-import=pandas.io.formats.style `
            --hidden-import=pandas.io.formats.excel `
            --hidden-import=openpyxl `
            --hidden-import=openpyxl.cell `
            --hidden-import=openpyxl.workbook `
            --hidden-import=openpyxl.worksheet `
            --hidden-import=openpyxl.reader.excel `
            --hidden-import=openpyxl.styles `
            --hidden-import=xlrd `
            --hidden-import=numpy `
            --hidden-import=numpy.core `
            --hidden-import=numpy.core._multiarray_umath `
            --hidden-import=requests `
            --hidden-import=requests.adapters `
            --hidden-import=requests.auth `
            --hidden-import=urllib3 `
            --hidden-import=urllib3.util `
            --hidden-import=certifi `
            server.py

      - name: Upload dist/server as artifact
        uses: actions/upload-artifact@v4
        with:
          name: server-windows-x64
          path: backend/dist/server/
          retention-days: 30