<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Excel AI Analyzer</title>
  <style>
    /* ── Reset ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── Fonts ── */
    @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap');

    /* ── Root ── */
    :root {
      --bg:        #0d0f14;
      --surface:   #151820;
      --border:    #1e2330;
      --accent:    #f0c060;
      --accent2:   #4fc3a1;
      --text:      #e8eaf0;
      --muted:     #5a6070;
      --mono:      'DM Mono', 'Courier New', monospace;
      --sans:      'DM Sans', system-ui, sans-serif;
    }

    html, body {
      width: 100%; height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      user-select: none;
      -webkit-app-region: drag;    /* allow window dragging since frame is hidden */
      overflow: hidden;
    }

    /* ── Layout ── */
    .container {
      width: 100%; height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px;
      position: relative;
    }

    /* ── Subtle grid background ── */
    .container::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 32px 32px;
      opacity: 0.4;
    }

    /* ── Logo mark ── */
    .logo-mark {
      width: 52px; height: 52px;
      border: 2px solid var(--accent);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 20px;
      position: relative;
      z-index: 1;
      animation: pulse 2.5s ease-in-out infinite;
    }

    .logo-mark svg {
      width: 26px; height: 26px;
      stroke: var(--accent);
      fill: none;
      stroke-width: 1.5;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(240,192,96,0); }
      50%       { box-shadow: 0 0 0 8px rgba(240,192,96,0.08); }
    }

    /* ── App name ── */
    .app-name {
      font-family: var(--mono);
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--accent);
      position: relative;
      z-index: 1;
      margin-bottom: 6px;
    }

    .app-tagline {
      font-size: 12px;
      font-weight: 300;
      color: var(--muted);
      letter-spacing: 0.04em;
      position: relative;
      z-index: 1;
      margin-bottom: 40px;
    }

    /* ── Progress bar ── */
    .progress-track {
      width: 220px;
      height: 2px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
      position: relative;
      z-index: 1;
      margin-bottom: 16px;
    }

    .progress-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--accent2), var(--accent));
      border-radius: 2px;
      transition: width 0.4s ease;
      animation: shimmer 1.8s ease-in-out infinite;
    }

    @keyframes shimmer {
      0%   { opacity: 1; }
      50%  { opacity: 0.6; }
      100% { opacity: 1; }
    }

    /* ── Status text ── */
    #status {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.06em;
      position: relative;
      z-index: 1;
      min-height: 16px;
      transition: opacity 0.3s ease;
    }

    /* ── Version badge ── */
    .version {
      position: absolute;
      bottom: 18px;
      right: 20px;
      font-family: var(--mono);
      font-size: 10px;
      color: var(--muted);
      opacity: 0.5;
      z-index: 1;
    }

    /* ── Privacy badge ── */
    .privacy {
      position: absolute;
      bottom: 18px;
      left: 20px;
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 10px;
      color: var(--accent2);
      opacity: 0.7;
      z-index: 1;
    }

    .privacy-dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: var(--accent2);
    }
  </style>
</head>
<body>
  <div class="container">

    <div class="logo-mark">
      <!-- Spreadsheet / table icon -->
      <svg viewBox="0 0 24 24">
        <rect x="3" y="3" width="18" height="18" rx="2"/>
        <line x1="3" y1="9" x2="21" y2="9"/>
        <line x1="3" y1="15" x2="21" y2="15"/>
        <line x1="9" y1="3" x2="9" y2="21"/>
      </svg>
    </div>

    <div class="app-name">Excel AI Analyzer</div>
    <div class="app-tagline">Private · Local · Powered by Ollama</div>

    <div class="progress-track">
      <div class="progress-bar" id="progress"></div>
    </div>

    <div id="status">Initialising…</div>

    <div class="privacy">
      <div class="privacy-dot"></div>
      Your data never leaves this machine
    </div>

    <div class="version">v1.0.0</div>

  </div>

  <script>
    // Animate the progress bar through fake stages to give visual feedback.
    // The actual status text is updated by main.js via executeJavaScript.
    const bar = document.getElementById('progress');
    const stages = [
      { pct: 15,  delay: 300  },
      { pct: 35,  delay: 800  },
      { pct: 55,  delay: 2000 },
      { pct: 75,  delay: 3500 },
      { pct: 90,  delay: 6000 },
    ];

    stages.forEach(({ pct, delay }) => {
      setTimeout(() => { bar.style.width = pct + '%'; }, delay);
    });

    // Jump to 100% when status says "Opening app"
    const observer = new MutationObserver(() => {
      const text = document.getElementById('status').textContent;
      if (text.includes('Opening')) {
        bar.style.width = '100%';
      }
    });
    observer.observe(document.getElementById('status'), { childList: true, characterData: true, subtree: true });
  </script>
</body>
</html>
